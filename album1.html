<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Album One - Tracklist</title>
    <style>
        /* CSS: THE STYLE AND LAYOUT */
        /* Start the counter at 0, so the first track becomes 11 */
tbody {
    counter-reset: track-counter 0; 
}

/* Automatically inject the counted number into the track-num cell */
.track-num::before {
    counter-increment: track-counter;
    content: counter(track-counter);
}
        
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: #121212;
            color: #ffffff;
        }

        /* Navigation bar to go back home */
        nav {
            padding: 20px;
            background-color: #181818;
        }

        nav a {
            color: #b3b3b3;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            color: #ffffff;
        }

        /* Two-column layout container */
        .album-container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px 120px 20px;
            display: flex;
            gap: 50px;
            flex-wrap: wrap; /* Makes it stack nicely on mobile phones */
        }

        /* Left Side: Album Details */
        .album-sidebar {
            flex: 1;
            min-width: 250px;
            text-align: center;
        }

        .album-art {
            width: 100%;
            max-width: 300px;
            aspect-ratio: 1/1;
            background-color: #333333;
            border-radius: 8px;
            margin: 0 auto 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        /* Right Side: Tracklist Table */
        .tracklist-container {
            flex: 2;
            min-width: 300px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        tr {
            border-bottom: 1px solid #282828;
            transition: background-color 0.2s ease;
        }

        tr:hover {
            background-color: #1c1c1c;
        }

        th, td {
            padding: 12px 15px;
            text-align: left;
        }

        th {
            color: #b3b3b3;
            font-size: 0.85rem;
            text-transform: uppercase;
            border-bottom: 2px solid #282828;
        }

        .track-num {
            color: #b3b3b3;
            width: 40px;
        }

        .play-btn {
            background-color: #1db954; /* Spotify Green */
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .play-btn:hover {
            background-color: #1ed760;
        }

        /* Persistent audio player at bottom */
        .audio-player {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: #181818;
            border-top: 1px solid #282828;
            padding: 15px 20px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        audio {
            width: 40%;
        }
    </style>
</head>
<body>

    <!-- Navigation Link Back to Homepage -->
    <nav>
        <a href="index.html">← Back to Discography</a>
    </nav>

    <div class="album-container">
        
        <!-- Left Side: Cover and Metadata -->
        <div class="album-sidebar">
            <div class="album-art">📀 Cover 1</div>
            <h2>First Album</h2>
            <p style="color: #b3b3b3;">Released: 2022</p>
        </div>

        <!-- Right Side: The 10 Songs -->
        <div class="tracklist-container">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Title</th>
                        <th>Listen</th>
                        <th>Time</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="track-num">01</td>
                        <td><strong>Song Title One</strong></td>
                        <td><button class="play-btn">Play</button></td>
                        <td style="color: #b3b3b3;">3:45</td>
                    </tr>
                    <tr>
                        <td class="track-num">02</td>
                        <td><strong>Song Title Two</strong></td>
                        <td><button class="play-btn">Play</button></td>
                        <td style="color: #b3b3b3;">4:12</td>
                    </tr>
                    <tr>
                        <td class="track-num">03</td>
                        <td><strong>Song Title Three</strong></td>
                        <td><button class="play-btn">Play</button></td>
                        <td style="color: #b3b3b3;">2:58</td>
                    </tr>
                    <!-- You would repeat this row structure up to track 10 -->
                </tbody>
            </table>
        </div>

    </div>

    <!-- The Audio Player Footer -->
    <div class="audio-player">
        <div>
            <strong id="current-title">Song Title One</strong>
            <span style="display:block; color:#b3b3b3; font-size:0.8rem;">First Album</span>
        </div>
        <audio controls></audio>
    </div>

</body>
</html>
